name: 'Conan library test, build, publish'

on:
  workflow_call:
    inputs:
      run-as-fast-build:
        description: 'Run as fast build, need conan context and profile as parameter'
        required: false
        type: boolean
        default: false
      enable-quality-analysis:
        description: 'Enable or not the SonarQube analysis'
        required: false
        type: boolean
        default: false
      enable-rebuild-collectors:
        description: 'Enable or not the rebuild of collectors'
        required: false
        type: boolean
        default: true
      enable-rebuild-context:
        description: 'Enable or not the rebuild of context'
        required: false
        type: boolean
        default: false
      build-missing:
        description: 'Build missing packages'
        required: false
        type: boolean
        default: false
      force-build:  
        description: 'Legacy source build context payload'
        required: false
        type: string
        default: ''
      source-build-context:
        description: 'Source build context payload'
        required: false
        type: string
        default: ''
      conan-context:
        description: 'Conan context plain text when run-as-fast-build is true'
        required: false
        type: string
        default: ''
      conan-profiles:
        description: 'Conan profile as json string'
        required: false
        type: string
        default: ''
      run-unit-tests:
        description: 'Run unit tests'
        required: false
        type: boolean
        default: false
      enabled-doxygen:
        description: 'Enable package Doxygen generation'
        required: false
        type: boolean
        default: false


env:
  ALL_SECRETS: ${{ toJson(secrets) }}
  SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
  SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
  CONAN_CONTEXT_PATH: ".conan-context/conan-context.yml"
  BUILD_ID: "${{github.run_number}}"
  RUN_ID: ${{ github.run_id }}
  RUN_ATTEMPT: ${{ github.run_attempt }}
  REPO: ${{ github.repository }}
  PACKAGE_NAME: ${{ github.event.repository.name }}

jobs:
  generate-conan-context:
    runs-on: eks-runner-linux-x64-medium
    if: inputs.run-as-fast-build == false
    container:
      image: repository.nexus.vixtechnology.com/docker-internal-group/aurora-compiler:main
      credentials:
        username: ${{ secrets.REPOSITORY_USERNAME_REPOSITORY_NEXUS_VIXTECHNOLOGY_COM }}
        password: ${{ secrets.REPOSITORY_TOKEN_REPOSITORY_NEXUS_VIXTECHNOLOGY_COM }}
    outputs:
      build-profile-list: ${{ steps.generate-conan-context.outputs.build-profile-list }}
      collectors-list: ${{ steps.generate-conan-context.outputs.collectors-list }}
    steps:
      - uses: actions/checkout@v6
      - uses: Group-Devices/emb-github-workflows/.github/actions/generate-conan-context@release/v1.0
        id: generate-conan-context
        with:
          json-secrets: ${{ toJson(secrets) }}
  unit-tests:
    runs-on: eks-runner-linux-x64-medium
    if: inputs.run-as-fast-build == false && inputs.run-unit-tests
    outputs:
      status: ${{ job.status }}
    container:
      image: repository.nexus.vixtechnology.com/docker-internal-group/aurora-compiler:main
      credentials:
        username: ${{ secrets.REPOSITORY_USERNAME_REPOSITORY_NEXUS_VIXTECHNOLOGY_COM }}
        password: ${{ secrets.REPOSITORY_TOKEN_REPOSITORY_NEXUS_VIXTECHNOLOGY_COM }}
    needs:
      - generate-conan-context
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: conan-context
          path: .conan-context
      - name: Configure Conan
        uses: Group-Devices/emb-github-workflows/.github/actions/configure-conan@release/v1.0
        with:
          json-secrets: ${{ toJson(secrets) }}
          conan-context-path: ${{ env.CONAN_CONTEXT_PATH }}

      - run: bash test.sh
      - name: run logs if fail
        if: failure()
        run: |
          cat coverage/Testing/Temporary/LastTest*

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action/linux@v2
        if: ${{ !cancelled() && hashFiles('coverage/junit-results.xml') != '' }}
        with:
          files: coverage/junit-results.xml

      - name: Report code coverage
        if: ${{ !cancelled() && hashFiles('coverage/coverage.info') != '' }}
        uses: zgosalvez/github-actions-report-lcov@v4
        with:
          coverage-files: coverage/coverage.info
          minimum-coverage: 0
          github-token: ${{ secrets.GITHUB_TOKEN }}
          artifact-name: code-coverage-report
          update-comment: true
          
  quality-analysis:
    runs-on: eks-runner-linux-x64-medium
    container:
      image: ghcr.io/actions/actions-runner:latest
    needs:
      - generate-conan-context
    if: inputs.run-as-fast-build == false && inputs.enable-quality-analysis
    steps:
      - run: echo "Will run a SonarQube analysis"
  build-and-upload:
    runs-on: ${{ startsWith(github.event.repository.name, 'qt') && 'eks-runner-linux-x64-large' || 'eks-runner-linux-x64-medium' }}
    if: >-
      always() && (
        inputs.conan-profiles != '' ||
        !inputs.run-unit-tests ||
        needs.unit-tests.result == 'success'
      )
    needs:
      - generate-conan-context
      - unit-tests
    strategy:
      fail-fast: false
      matrix:
        profile: ${{ inputs.conan-profiles != '' && fromJson(inputs.conan-profiles) || fromJson(needs.generate-conan-context.outputs.build-profile-list) }}
    container:
      image: repository.nexus.vixtechnology.com/docker-internal-group/${{ matrix.profile }}-compiler:main
      credentials:
        username: ${{ secrets.REPOSITORY_USERNAME_REPOSITORY_NEXUS_VIXTECHNOLOGY_COM }}
        password: ${{ secrets.REPOSITORY_TOKEN_REPOSITORY_NEXUS_VIXTECHNOLOGY_COM }}
    steps:
      - uses: actions/checkout@v6
      - name: Set safe git path
        run: |
          repo=$(basename ${{ github.repository }})
          git config --global --add safe.directory "/__w/${repo}/${repo}"
      - name: Prepare Conan context
        shell: bash
        run: |
          if [ -n "${{ inputs.conan-context }}" ]; then
            mkdir -p .conan-context
            printf '%s\n' "${{ inputs.conan-context }}" > .conan-context/conan-context.yml
          else
            mkdir -p .conan-context
          fi

      - name: Download Conan context artifact
        if: inputs.conan-context == ''
        uses: actions/download-artifact@v8
        with:
          name: conan-context
          path: .conan-context
      - name: Configure Conan
        uses: Group-Devices/emb-github-workflows/.github/actions/configure-conan@release/v1.0
        with:
          json-secrets: ${{ toJson(secrets) }}
          conan-context-path: ${{ env.CONAN_CONTEXT_PATH }}

      - name: Resolve Conan cache mode
        run: |
          context_cache_mode=$(yq e '.build.cache_mode // ""' "${CONAN_CONTEXT_PATH}")
          if [ -z "$context_cache_mode" ] || [ "$context_cache_mode" = "null" ]; then
            context_use_cache=$(yq e '.build.use_cache // .use_cache // false' "${CONAN_CONTEXT_PATH}")
            if [ "$context_use_cache" = 'true' ]; then
              context_cache_mode=recipes
            else
              context_cache_mode=none
            fi
          fi
          case "$context_cache_mode" in
            none|recipes|full)
              echo "CACHE_MODE=$context_cache_mode" >> "$GITHUB_ENV"
              ;;
            *)
              echo "Unsupported build.cache_mode: $context_cache_mode"
              exit 1
              ;;
          esac

      - name: Export GitHub context to environment
        run: |
          {
            echo "RUN_ID=$GITHUB_RUN_ID"
            echo "RUN_NUMBER=$GITHUB_RUN_NUMBER"
            echo "RUN_ATTEMPT=$GITHUB_RUN_ATTEMPT"
            echo "REPO=$GITHUB_REPOSITORY"
            echo "OWNER=${GITHUB_REPOSITORY_OWNER}"
            echo "SHA=$GITHUB_SHA"
            echo "REF=$GITHUB_REF"
            echo "ACTOR=$GITHUB_ACTOR"
            echo "WORKFLOW=$GITHUB_WORKFLOW"
          } >> "$GITHUB_ENV"

      - name: Restore Conan build state
        uses: Group-Devices/emb-github-workflows/.github/actions/restore-conan-build-state@release/v1.0
        with:
          source-build-context: ${{ inputs.source-build-context != '' && inputs.source-build-context || inputs.force-build }}
          json-secrets: ${{ toJson(secrets) }}
          profile: ${{ matrix.profile }}
          cache-mode: ${{ env.CACHE_MODE }}
          create-lockfile-command: conan lock create . --profile=${{ matrix.profile }} --lockfile-out=conan-lockfile.json

      - name: Conan create
        shell: bash
        run: |
          set -o pipefail
          upload=$(yq e '.upload' "${CONAN_CONTEXT_PATH}")
          if [ -z "${upload}" ] || [ "null" = "${upload}" ]; then
            echo "Field upload is missing in ${CONAN_CONTEXT_PATH}"
            echo "Please add it"
            exit 1
          else
            echo "Conan upload to repository ${upload}"
          fi
          repo=$(basename ${{ github.repository }})
          use_ripple_id=$(yq e '.use_ripple_id' "${CONAN_CONTEXT_PATH}")
          if [ "${use_ripple_id}" = "true" ]; then
               echo "USE_RIPPLE_ID=true" >> "$GITHUB_ENV"
          fi
          LOCK_OPTIONS=""
          if [ "${{ inputs.build-missing }}" = "true" ]; then
            conan graph build-order . -pr:h "${{ matrix.profile }}" --build=missing --format=json --reduce --order-by recipe -l conan-lockfile.json --lockfile-partial > "build-${{ matrix.profile }}.json"
            jq -r '.order[][].ref' < "build-${{ matrix.profile }}.json" | while read -r ref; do
              package_path="$(conan cache path "${ref}")"
              url="$(yq -r '.url'  < "${package_path}/conandata.yml" )"
              sha="$(yq -r '.sha'  < "${package_path}/conandata.yml" )"
              bundle="$(yq -r '.bundle'  < "${package_path}/conandata.yml" )"
              context=$(yq e '.bundle' "${CONAN_CONTEXT_PATH}")
              if [ "${bundle}" !=  "${context}" ]; then
                echo "need to rebuild a package ${ref} from another context ${bundle}"  
                echo "Looks like ${bundle is broken}"
                exit 1
              fi
              OWNER="${url#*//}"
              OWNER="${OWNER#*/}"
              OWNER="${OWNER%/*}"
              echo "url $url sha $sha OWNER $OWNER"
              OWNER_GIT_TOKEN_SECRET=GIT_TOKEN_$(echo "${OWNER}" | tr '[:lower:]' '[:upper:]' | tr '-' '_')
              # shellcheck disable=SC2086
              all_secrets='${{ tojson(secrets) }}'
              OWNER_GIT_TOKEN=$(echo "$all_secrets" | jq -r ".${OWNER_GIT_TOKEN_SECRET}")
              all_secrets=''
              if [ -z "${OWNER_GIT_TOKEN}" ] || [ "null" = "${OWNER_GIT_TOKEN}" ]; then
                 echo "Secret ${OWNER_GIT_TOKEN_SECRET} not found !"
                 echo "Please add secret ${OWNER_GIT_TOKEN_SECRET} to https://github.com/organizations/${GITHUB_REPOSITORY_OWNER}/settings/secrets/actions"
                 exit 1
              else
                 echo "Found secret ${OWNER_GIT_TOKEN_SECRET}"
              fi
              echo "${OWNER_GIT_TOKEN}" > mytoken.txt
              gh auth login --with-token < mytoken.txt
              rm mytoken.txt              
              echo "extracting package name and version from $ref"
              name="${ref%/*}"
              prev="${ref#*/}"
              prev="${prev%#*}"
              gh repo clone "$url" "$name"
              echo "name $name version $prev adding ripple build id"
              version="${prev%+*}"
              build="${prev#*+}"
              build="${build%.*}"
              echo "Ripple building ${name} from version ${version} build ${build} ...."
              cd "${name}"
              git reset --hard "$sha"
              # Following command must exit if conan create fail because we've set on top of this script 'set -o pipefail'
              # Please do not add any command behind '| tee conan_create.log' that could change the return code
              PREVIOUS_VERSION="${version}+${build}" conan create . -pr:h "${{ matrix.profile }}" -l ../conan-lockfile.json --lockfile-partial 2>&1 | tee conan_create.log
              cd ..
              if [ ${{ github.event_name }} != 'pull_request' ]; then
                conan upload -r "${upload}" "${name}" --confirm
              fi  
            done
            LOCK_OPTIONS="--lockfile-partial"
          fi  
          conan create . -pr:h "${{ matrix.profile }}" -l conan-lockfile.json $LOCK_OPTIONS 2>&1 | tee conan_create.log
          if [ ${{ github.event_name }} != 'pull_request' ]; then
            conan upload -r "${upload}" "${repo}" --confirm
          fi   

      - if: ${{ inputs.build-missing }}
        name: upload build packages list
        uses: actions/upload-artifact@v6
        with:
          name: build-list-${{ matrix.profile }}
          path: build-${{ matrix.profile }}.json
          retention-days: 2

      - if: ${{ github.event_name != 'pull_request' }}
        name: Upload Conan build state
        uses: Group-Devices/emb-github-workflows/.github/actions/upload-conan-build-state@release/v1.0
        with:
          profile: ${{ matrix.profile }}
          cache-mode: ${{ env.CACHE_MODE }}
          
  rebuild-collectors:
    runs-on: ubuntu-latest
    if: always() && inputs.run-as-fast-build == false && inputs.enable-rebuild-collectors && needs.build-and-upload.result == 'success'
    needs:
      - generate-conan-context
      - build-and-upload
    strategy:
      fail-fast: false
      matrix:
        collector: ${{ fromJson(needs.generate-conan-context.outputs.collectors-list) }}
    env:
      TARGET_WORKFLOW: "rebuild.yml"
    steps:
      - name: Extract owner of collector ${{ matrix.collector }}
        run: |
          owner=$(echo "${{ matrix.collector }}" | cut -d'/' -f1)
          echo "Owner of collector: ${owner}"
          echo "COLLECTOR_OWNER=${owner}" >> "$GITHUB_ENV"

      - name: Extract authentication token for ${{ env.COLLECTOR_OWNER }}
        uses: Group-Devices/emb-github-workflows/.github/actions/gh-auth-owner@release/v1.0
        with:
          owner: ${{ env.COLLECTOR_OWNER }}
          json-secrets: ${{ toJson(secrets) }}

      - name: Check if repository ${{ matrix.collector }} exists
        run: |
          if gh repo view "${{ matrix.collector }}" --json name --jq .name > /dev/null 2>&1; then
            echo "Repository ${{ matrix.collector }} exists."
          else
            echo "Repository ${{ matrix.collector }} does not exist or actual token cannot see it."
            exit 1
          fi

      - name: Check if branch ${{ github.ref_name }} exists in ${{ matrix.collector }}
        run: |
          if gh api repos/${{ matrix.collector }}/branches/${{ github.ref_name }} --silent > /dev/null 2>&1; then
            echo "Branch ${{ github.ref_name }} found in ${{ matrix.collector }}"
          else
            echo "Branch ${{ github.ref_name }} does not exists in ${{ matrix.collector }}"
            exit 1
          fi

      - name: Check if workflow ${{ env.TARGET_WORKFLOW }} exists in ${{ matrix.collector }}/${{ github.ref_name }}
        run: |
          if gh api repos/${{ matrix.collector }}/contents/.github/workflows/${{ env.TARGET_WORKFLOW }}?ref=${{ github.ref_name }} --silent > /dev/null; then
            echo "Workflow ${TARGET_WORKFLOW} exists in ${{ matrix.collector }}."
          else
            echo "Workflow ${TARGET_WORKFLOW} does not exists in ${{ matrix.collector }}."
            exit 1
          fi

      - id: package-context
        name: Build package source context
        uses: Group-Devices/emb-github-workflows/.github/actions/build-source-build-context@release/v1.0
        with:
          append-key: package_context

      - name: Dispatch workflow of ${{ matrix.collector }} on ${{ github.ref_name }}
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          JSON='${{ steps.package-context.outputs.context }}'
          echo "context pass $JSON"
          echo "command gh workflow run ${TARGET_WORKFLOW} --repo ${{ matrix.collector }} --ref ${{ github.ref_name }} --field source_build_context=$JSON --field built_package=$JSON"
          gh workflow run "${TARGET_WORKFLOW}" \
            --repo "${{ matrix.collector }}" \
            --ref "${{ github.ref_name }}" \
            --field rebuild_cause="Rebuild collector due to package change in ${{ github.repository }} on ${{ github.ref_name }} (sha $SHORT_SHA)" \
            --field source_build_context="$JSON" \
            --field built_package="$JSON"            

  rebuild-context:
    runs-on: ubuntu-latest
    needs: 
      - build-and-upload
    if: always() && inputs.run-as-fast-build == false && inputs.enable-rebuild-context && needs.build-and-upload.result == 'success'
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: conan-context
          path: .conan-context

      - name: Extract context owner
        run: |
          context=$(yq e '.bundle' "${CONAN_CONTEXT_PATH}")
          echo "Context: ${context}"
          OWNER=$(echo "${context}" | cut -d'/' -f1)
          echo "Owner: ${OWNER}"
          echo "CONTEXT_OWNER=${OWNER}" >> "$GITHUB_ENV"
      - name: Extract authentication token
        uses: Group-Devices/emb-github-workflows/.github/actions/gh-auth-owner@release/v1.0
        with:
          owner: ${{ env.CONTEXT_OWNER }}
          json-secrets: ${{ toJson(secrets) }}
      - id: collector-context
        name: Build collector source context
        uses: Group-Devices/emb-github-workflows/.github/actions/build-source-build-context@release/v1.0
        with:
          append-key: collector_context
          incoming-context: ${{ inputs.source-build-context }}
          fallback-context: ${{ inputs.force-build }}
      - name: Call context delivery  
        run: |  
          context=$(yq e '.bundle' "${CONAN_CONTEXT_PATH}")
          SOURCE_BUILD_CONTEXT='${{ steps.collector-context.outputs.context }}'
          COLLECTOR_REPO=$(echo "$SOURCE_BUILD_CONTEXT" | jq -r '.collector_context.repo // "unknown-collector"')
          PACKAGE_REPO=$(echo "$SOURCE_BUILD_CONTEXT" | jq -r '.package_context.repo // "unknown-package"')
          COLLECTOR_NAME=${COLLECTOR_REPO#*/}
          PACKAGE_NAME=${PACKAGE_REPO#*/}
          gh workflow run "delivery.yml" \
            --repo "${context}" \
            --ref "${{ github.ref_name }}" \
            --field rebuild_cause="Rebuild context after collector rebuild (${COLLECTOR_NAME}) due to package change in ${PACKAGE_NAME} on ${{ github.ref_name }}" \
            --field source_build_context="$SOURCE_BUILD_CONTEXT"
