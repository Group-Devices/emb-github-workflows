name: "Check Collector Relevance"
description: "Determine whether a collector depends on the changed package for any active profile"

inputs:
  source-build-context:
    description: "Source build context payload"
    required: false
    default: ""
  conan-context-path:
    description: "Path to the collector conan context"
    required: true
  json-secrets:
    description: "All secrets in json format"
    required: true

outputs:
  should-build:
    description: "Whether the collector should rebuild"
    value: ${{ steps.check.outputs.should-build }}
  relevant-profiles:
    description: "JSON array of profiles that depend on the changed package"
    value: ${{ steps.check.outputs.relevant-profiles }}

runs:
  using: "composite"
  steps:
    - name: Configure Conan
      uses: Group-Devices/emb-github-workflows/.github/actions/configure-conan@release/v1.0
      with:
        json-secrets: ${{ inputs.json-secrets }}
        conan-context-path: ${{ inputs.conan-context-path }}

    - id: check
      shell: bash
      env:
        SOURCE_BUILD_CONTEXT: ${{ inputs.source-build-context }}
        CONAN_CONTEXT_PATH: ${{ inputs.conan-context-path }}
      run: |
        set -euo pipefail

        PROFILES_JSON=$(yq -r '.build.profiles' "$CONAN_CONTEXT_PATH" -o=json | jq -c)
        if [ -z "$SOURCE_BUILD_CONTEXT" ]; then
          echo "No source_build_context provided, collector build remains enabled for all configured profiles."
          echo "should-build=true" >> "$GITHUB_OUTPUT"
          echo "relevant-profiles=$PROFILES_JSON" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        PKG_REF=$(echo "$SOURCE_BUILD_CONTEXT" | jq -r '.package_context.ref // empty')
        PKG_REPO=$(echo "$SOURCE_BUILD_CONTEXT" | jq -r '.package_context.repo // empty')
        PKG_NAME=$(echo "$SOURCE_BUILD_CONTEXT" | jq -r '.package_context.name // empty')

        if [ -z "$PKG_NAME" ] && [ -n "$PKG_REF" ]; then
          PKG_NAME=${PKG_REF%%/*}
        fi
        if [ -z "$PKG_NAME" ] && [ -n "$PKG_REPO" ]; then
          PKG_NAME=${PKG_REPO#*/}
        fi

        if [ -z "$PKG_NAME" ]; then
          echo "Unable to determine package name from source_build_context: $SOURCE_BUILD_CONTEXT"
          exit 1
        fi

        SHOULD_BUILD=false
        RELEVANT_PROFILES=()

        while IFS= read -r PROFILE; do
          [ -n "$PROFILE" ] || continue
          conan graph build-order . \
            -pr:h "$PROFILE" \
            --build=missing \
            --format=json \
            --reduce \
            --order-by recipe > "build-${PROFILE}.json"

          if jq -e --arg pkg "$PKG_NAME" '
              [.order // [] | .[][]? | .ref // ""] | any(startswith($pkg + "/"))
            ' "build-${PROFILE}.json" >/dev/null; then
            SHOULD_BUILD=true
            RELEVANT_PROFILES+=("\"$PROFILE\"")
          fi
        done < <(echo "$PROFILES_JSON" | jq -r '.[]')

        echo "should-build=$SHOULD_BUILD" >> "$GITHUB_OUTPUT"
        echo "relevant-profiles=[$(IFS=,; echo "${RELEVANT_PROFILES[*]}")]" >> "$GITHUB_OUTPUT"
